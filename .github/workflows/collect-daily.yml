name: Daily Data Collection

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日 02:00 JST (UTC 17:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/collector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/collector/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --- Apps チャンネル ---
      - name: Collect App Store rankings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run collect:appstore

      - name: Collect Google Play rankings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run collect:googleplay

      # --- GenAI チャンネル (Phase 3.5) ---
      - name: Collect GenAI items
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run collect:genai

      # --- Phase 4: 拡張データソース ---
      - name: Collect Phase 4 sources
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRODUCT_HUNT_API_TOKEN: ${{ secrets.PRODUCT_HUNT_API_TOKEN }}
        run: npm run collect:phase4
